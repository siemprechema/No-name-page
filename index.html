<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>22-DDM</title>
    <style>
        /* === VARIABLES & TYPOGRAPHY === */
        :root {
            --bg-color: #f7f7f7;
            --panel-bg: #ffffff;
            --text-color: #111111;
            --border-color: #d1d1d1;
            --accent-color: #bdf271; 
            --font-main: 'Acumin Pro', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            --radius-soft: 12px; 
            --radius-round: 50px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
            font-size: 14px;
            -webkit-font-smoothing: antialiased;
        }

        .app-container { display: flex; width: 100%; height: 100%; }

        /* === SIDEBAR === */
        .sidebar {
            width: 340px; min-width: 340px; height: 100%;
            border-right: 1px solid var(--border-color);
            display: flex; flex-direction: column;
            background-color: var(--panel-bg); overflow-y: auto; z-index: 10;
            box-shadow: 2px 0 15px rgba(0,0,0,0.03);
        }

        .header-brand {
            padding: 24px; border-bottom: 1px solid var(--border-color);
            background-color: var(--panel-bg);
        }

        .header-brand h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
        .header-brand p { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #666; margin-top: 4px; }

        .module-section { padding: 24px; border-bottom: 1px solid var(--border-color); }
        .module-title { font-size: 13px; font-weight: 700; text-transform: uppercase; margin-bottom: 18px; letter-spacing: 0.5px; color: #333;}

        /* === UI CONTROLS === */
        .control-group { margin-bottom: 18px; }
        .control-group label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; margin-bottom: 8px; color: #555; }
        .flex-label { display: flex; justify-content: space-between; align-items: center; }

        select, input[type="color"] {
            width: 100%; padding: 12px; border: 1.5px solid var(--border-color);
            background: var(--bg-color); font-family: var(--font-main); font-size: 13px; font-weight: 500;
            cursor: pointer; outline: none; border-radius: var(--radius-soft);
            transition: border-color 0.2s ease;
        }
        
        select:focus { border-color: var(--text-color); }
        
        select {
            appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg fill="%23333" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/></svg>');
            background-repeat: no-repeat; background-position-x: 96%; background-position-y: 50%;
        }

        input[type="color"] { height: 44px; padding: 4px; }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; border-radius: 6px;}
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 6px; }

        input[type="range"] { -webkit-appearance: none; width: 100%; background: transparent; margin-top: 6px; }
        input[type="range"]::-webkit-slider-thumb { 
            -webkit-appearance: none; height: 18px; width: 18px; 
            background: var(--text-color); cursor: pointer; border-radius: 50%; margin-top: -7px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        input[type="range"]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: #e0e0e0; border-radius: 2px; }

        .checkbox-wrapper { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .checkbox-wrapper input[type="checkbox"] { 
            appearance: none; width: 20px; height: 20px; border: 1.5px solid var(--border-color); 
            cursor: pointer; border-radius: 6px; transition: all 0.2s;
        }
        .checkbox-wrapper input[type="checkbox"]:checked { 
            background-color: var(--text-color); border-color: var(--text-color);
            background-image: url('data:image/svg+xml;utf8,<svg fill="white" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>');
        }

        /* === CANVAS AREA === */
        .canvas-area {
            flex-grow: 1; display: flex; flex-direction: column; background-color: #eeeeee; position: relative; overflow: hidden;
        }

        .zoom-toolbar {
            position: absolute; top: 24px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 8px; background: rgba(255,255,255,0.9); padding: 6px;
            border-radius: var(--radius-round); box-shadow: 0 4px 15px rgba(0,0,0,0.05); z-index: 5;
            backdrop-filter: blur(5px);
        }
        .zoom-toolbar button {
            background: transparent; border: none; padding: 8px 16px; font-family: var(--font-main); 
            font-weight: 700; font-size: 12px; cursor: pointer; color: var(--text-color); border-radius: var(--radius-round);
            transition: background 0.2s;
        }
        .zoom-toolbar button:hover { background: #f0f0f0; }

        .canvas-container {
            flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 80px 20px 20px 20px; overflow: auto;
        }

        .canvas-wrapper {
            transition: transform 0.2s ease-out; transform-origin: center center;
            box-shadow: 0 15px 50px rgba(0,0,0,0.1); border-radius: 4px; overflow: hidden;
        }

        #art-canvas {
            display: block; max-width: 100%; max-height: 80vh; 
            cursor: crosshair; touch-action: none;
        }

        /* === ACTION BAR === */
        .action-bar {
            padding: 24px; border-top: 1px solid var(--border-color); background-color: var(--panel-bg); 
            display: flex; gap: 16px; justify-content: flex-end; z-index: 10;
        }
        .btn { 
            padding: 12px 24px; font-family: var(--font-main); font-weight: 700; font-size: 13px; 
            cursor: pointer; border-radius: var(--radius-soft); transition: all 0.2s ease; border: none;
        }
        .btn-outline { background-color: var(--bg-color); color: var(--text-color); border: 1.5px solid var(--border-color); }
        .btn-outline:hover { background-color: #eaeaea; }
        .btn-solid { background-color: var(--text-color); color: white; }
        .btn-solid:hover { background-color: #333333; transform: translateY(-1px); box-shadow: 0 4px 10px rgba(0,0,0,0.15);}
    </style>
</head>
<body>

    <div class="app-container">
        
        <aside class="sidebar">
            <header class="header-brand">
                <h1>22-DDM</h1>
                <p>Experimental tool</p> </header>

            <section class="module-section">
                <h2 class="module-title">1. Brush Settings</h2>
                
                <div class="control-group">
                    <label>Brush Type</label>
                    <select id="brush-type">
                        <option value="line">Continuous Line</option>
                        <option value="ant">Ants</option>
                        <option value="bee">Bees</option>
                        <option value="star">Stars</option>
                        <option value="square">Squares</option>
                        <option value="dot">Dots</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>Brush Color</label>
                    <input type="color" id="brush-color" value="#111111">
                </div>
                
                <div class="control-group">
                    <label>Size / Thickness</label>
                    <input type="range" id="brush-size" min="5" max="100" value="25">
                </div>

                <div class="control-group">
                    <label>Object Spacing</label>
                    <input type="range" id="brush-spacing" min="1" max="150" value="30">
                </div>

                <div class="control-group">
                    <div class="flex-label">
                        <label>Fidelity (Smooth &rarr; Accurate)</label>
                    </div>
                    <input type="range" id="stroke-fidelity" min="1" max="100" value="50">
                </div>
            </section>

            <section class="module-section">
                <h2 class="module-title">2. Special Effects</h2>
                
                <div class="control-group">
                    <label>Blur Intensity</label>
                    <input type="range" id="brush-blur" min="0" max="20" value="0">
                </div>

                <div class="control-group checkbox-wrapper">
                    <input type="checkbox" id="particles">
                    <label for="particles" style="margin-bottom:0; font-size:13px;">Scatter Particles</label>
                </div>
            </section>

            <section class="module-section" style="border-bottom: none;">
                <h2 class="module-title">3. Canvas & Background</h2>
                <div class="control-group">
                    <label>Canvas Format</label>
                    <select id="canvas-format">
                        <option value="3:4">Vertical 3:4</option>
                        <option value="16:9">Horizontal 16:9</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>Background Color</label>
                    <input type="color" id="bg-color" value="#bdf271">
                </div>
            </section>
        </aside>

        <main class="canvas-area">
            <div class="zoom-toolbar">
                <button id="btn-zoom-out">Zoom Out</button>
                <button id="btn-zoom-fit">Fit Screen</button>
                <button id="btn-zoom-in">Zoom In</button>
            </div>

            <div class="canvas-container" id="canvas-container">
                <div class="canvas-wrapper" id="canvas-wrapper">
                    <canvas id="art-canvas"></canvas>
                </div>
            </div>

            <div class="action-bar">
                <button class="btn btn-outline" id="btn-clear">Clear Canvas</button>
                <button class="btn btn-solid">Export Artwork</button>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('art-canvas');
            const ctx = canvas.getContext('2d');
            const canvasWrapper = document.getElementById('canvas-wrapper');
            
            let isDrawing = false;
            let currentZoom = 1;
            let lastX = 0;
            let lastY = 0;

            // UI Elements
            const brushType = document.getElementById('brush-type');
            const brushColor = document.getElementById('brush-color');
            const brushSize = document.getElementById('brush-size');
            const brushSpacing = document.getElementById('brush-spacing');
            const strokeFidelity = document.getElementById('stroke-fidelity');
            const brushBlur = document.getElementById('brush-blur');
            const particlesCheck = document.getElementById('particles');
            const formatSelect = document.getElementById('canvas-format');
            const bgColorInput = document.getElementById('bg-color');
            const btnClear = document.getElementById('btn-clear');

            function initCanvas() {
                const format = formatSelect.value;
                if(format === '3:4') {
                    canvas.width = 1200; canvas.height = 1600;
                    canvas.style.aspectRatio = "3/4";
                    canvas.style.maxHeight = "80vh"; canvas.style.maxWidth = "auto";
                } else {
                    canvas.width = 1920; canvas.height = 1080;
                    canvas.style.aspectRatio = "16/9";
                    canvas.style.maxHeight = "auto"; canvas.style.maxWidth = "80vw";
                }
                fillBackground();
                resetZoom();
            }

            function fillBackground() {
                ctx.fillStyle = bgColorInput.value;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            function getCoordinates(e) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;   
                const scaleY = canvas.height / rect.height; 
                return {
                    x: (e.clientX - rect.left) * scaleX,
                    y: (e.clientY - rect.top) * scaleY
                };
            }

            function startPosition(e) {
                isDrawing = true;
                const coords = getCoordinates(e);
                lastX = coords.x;
                lastY = coords.y;
                drawStamp(lastX, lastY, 0); 
            }

            function endPosition() {
                isDrawing = false;
                ctx.beginPath();
            }

            function draw(e) {
                if (!isDrawing) return;
                e.preventDefault();

                const coords = getCoordinates(e);
                const x = coords.x;
                const y = coords.y;
                
                const type = brushType.value;
                const spacing = parseInt(brushSpacing.value);
                const dist = Math.hypot(x - lastX, y - lastY);

                // Lógica de Fidelidad: Si es 100 (Accurate) umbral es 0. Si es 1 (Smooth) umbral es mayor.
                const fidelityVal = parseInt(strokeFidelity.value);
                const smoothThreshold = (100 - fidelityVal) * 0.15; 

                if (type === 'line') {
                    if (dist >= smoothThreshold) {
                        ctx.filter = `blur(${brushBlur.value}px)`;
                        ctx.lineWidth = brushSize.value;
                        ctx.lineCap = 'round';
                        ctx.lineJoin = 'round';
                        ctx.strokeStyle = brushColor.value;
                        ctx.lineTo(x, y);
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.moveTo(x, y);
                        lastX = x; lastY = y;
                        
                        if(particlesCheck.checked) drawParticles(x, y);
                    }
                } 
                else {
                    if (dist >= spacing) {
                        const stampsCount = Math.floor(dist / spacing);
                        for(let i = 1; i <= stampsCount; i++) {
                            const nextX = lastX + (x - lastX) * (i / stampsCount);
                            const nextY = lastY + (y - lastY) * (i / stampsCount);
                            const angle = Math.atan2(y - lastY, x - lastX); 
                            drawStamp(nextX, nextY, angle);
                        }
                        lastX = x;
                        lastY = y;
                    }
                }
            }

            function drawStamp(x, y, angle) {
                const type = brushType.value;
                const size = parseInt(brushSize.value);
                const color = brushColor.value;
                
                ctx.save();
                ctx.translate(x, y);
                
                if(type === 'ant' || type === 'bee') {
                    ctx.rotate(angle + Math.PI / 2); 
                } else if(type === 'star' || type === 'square') {
                    ctx.rotate(angle); 
                }

                ctx.filter = `blur(${brushBlur.value}px)`;
                ctx.fillStyle = color;
                
                if(type === 'dot') {
                    ctx.beginPath();
                    ctx.arc(0, 0, size/2, 0, Math.PI * 2);
                    ctx.fill();
                } else if (type === 'square') {
                    ctx.fillRect(-size/2, -size/2, size, size);
                } else if (type === 'star') {
                    drawStar(0, 0, 5, size/2, size/4);
                } else if (type === 'ant') {
                    ctx.font = `${size}px sans-serif`;
                    ctx.textAlign = "center"; ctx.textBaseline = "middle";
                    ctx.fillText("🐜", 0, 0);
                } else if (type === 'bee') {
                    ctx.font = `${size}px sans-serif`;
                    ctx.textAlign = "center"; ctx.textBaseline = "middle";
                    ctx.fillText("🐝", 0, 0);
                }

                ctx.restore();

                if(particlesCheck.checked) drawParticles(x, y);
            }

            function drawStar(cx, cy, spikes, outerRadius, innerRadius) {
                let rot = Math.PI / 2 * 3;
                let x = cx; let y = cy;
                let step = Math.PI / spikes;
                ctx.beginPath();
                ctx.moveTo(cx, cy - outerRadius);
                for (let i = 0; i < spikes; i++) {
                    x = cx + Math.cos(rot) * outerRadius;
                    y = cy + Math.sin(rot) * outerRadius;
                    ctx.lineTo(x, y);
                    rot += step;
                    x = cx + Math.cos(rot) * innerRadius;
                    y = cy + Math.sin(rot) * innerRadius;
                    ctx.lineTo(x, y);
                    rot += step;
                }
                ctx.lineTo(cx, cy - outerRadius);
                ctx.closePath();
                ctx.fill();
            }

            // Ajuste 3: Partículas orgánicas/irregulares
            function drawParticles(x, y) {
                const size = parseInt(brushSize.value);
                ctx.save();
                ctx.fillStyle = brushColor.value;
                ctx.filter = `blur(${Math.max(0, brushBlur.value - 2)}px)`; // Ligero desenfoque natural
                
                for(let i = 0; i < 3; i++) { 
                    // Esparce las partículas
                    let px = x + (Math.random() - 0.5) * size * 2.5;
                    let py = y + (Math.random() - 0.5) * size * 2.5;
                    let baseSize = Math.random() * (size * 0.15) + 1; // Tamaño base de la mancha
                    
                    ctx.beginPath();
                    // Crea un polígono irregular de entre 4 y 7 puntos para simular tinta real
                    let points = Math.floor(Math.random() * 4) + 4; 
                    for(let j = 0; j < points; j++) {
                        let angle = (j / points) * Math.PI * 2;
                        // Radio aleatorio para deformar la figura
                        let radius = baseSize * (0.4 + Math.random() * 0.8); 
                        let vx = px + Math.cos(angle) * radius;
                        let vy = py + Math.sin(angle) * radius;
                        
                        if(j === 0) ctx.moveTo(vx, vy);
                        else ctx.lineTo(vx, vy);
                    }
                    ctx.closePath();
                    ctx.fill();
                }
                ctx.restore();
            }

            // Pointer Event Listeners (Wacom/Mouse)
            canvas.addEventListener('pointerdown', startPosition);
            canvas.addEventListener('pointerup', endPosition);
            canvas.addEventListener('pointermove', draw);
            canvas.addEventListener('pointerleave', endPosition);
            canvas.addEventListener('pointercancel', endPosition);

            // UI Listeners
            formatSelect.addEventListener('change', initCanvas);
            bgColorInput.addEventListener('input', fillBackground);
            btnClear.addEventListener('click', fillBackground);

            // Zoom Controls
            function applyZoom() { canvasWrapper.style.transform = `scale(${currentZoom})`; }
            function resetZoom() { currentZoom = 1; applyZoom(); }
            document.getElementById('btn-zoom-in').addEventListener('click', () => { currentZoom += 0.2; applyZoom(); });
            document.getElementById('btn-zoom-out').addEventListener('click', () => { if(currentZoom > 0.4) { currentZoom -= 0.2; applyZoom(); } });
            document.getElementById('btn-zoom-fit').addEventListener('click', resetZoom);

            initCanvas();
        });
    </script>
</body>
</html>
