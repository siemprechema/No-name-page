<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>22-DDM</title>
    <style>
        /* === VARIABLES & TYPOGRAPHY === */
        :root {
            --bg-color: #f7f7f7;
            --panel-bg: #ffffff;
            --text-color: #111111;
            --border-color: #d1d1d1;
            --accent-color: #bdf271; 
            --font-main: 'Acumin Pro', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            --radius-soft: 12px; 
            --radius-round: 50px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
            font-size: 14px;
            -webkit-font-smoothing: antialiased;
        }

        .app-container { display: flex; width: 100%; height: 100%; }

        /* === SIDEBAR === */
        .sidebar {
            width: 340px; min-width: 340px; height: 100%;
            border-right: 1px solid var(--border-color);
            display: flex; flex-direction: column;
            background-color: var(--panel-bg); overflow-y: auto; z-index: 10;
            box-shadow: 2px 0 15px rgba(0,0,0,0.03);
        }

        .header-brand {
            padding: 24px; border-bottom: 1px solid var(--border-color);
            background-color: var(--panel-bg);
        }

        .header-brand h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
        .header-brand p { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #666; margin-top: 4px; }

        .module-section { padding: 24px; border-bottom: 1px solid var(--border-color); }
        .module-title { font-size: 13px; font-weight: 700; text-transform: uppercase; margin-bottom: 18px; letter-spacing: 0.5px; color: #333;}

        /* === UI CONTROLS === */
        .control-group { margin-bottom: 18px; }
        .control-group label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; margin-bottom: 8px; color: #555; }
        .flex-label { display: flex; justify-content: space-between; align-items: center; }
        
        /* Checkbox styling */
        .checkbox-group { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
        .checkbox-group input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; accent-color: var(--text-color); }
        .checkbox-group label { margin-bottom: 0; cursor: pointer; }

        select, input[type="color"] {
            width: 100%; padding: 12px; border: 1.5px solid var(--border-color);
            background: var(--bg-color); font-family: var(--font-main); font-size: 13px; font-weight: 500;
            cursor: pointer; outline: none; border-radius: var(--radius-soft);
            transition: border-color 0.2s ease;
        }
        
        select:focus { border-color: var(--text-color); }
        
        select {
            appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg fill="%23333" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/></svg>');
            background-repeat: no-repeat; background-position-x: 96%; background-position-y: 50%;
        }

        input[type="color"] { height: 44px; padding: 4px; }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; border-radius: 6px;}
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 6px; }

        input[type="range"] { -webkit-appearance: none; width: 100%; background: transparent; margin-top: 6px; }
        input[type="range"]::-webkit-slider-thumb { 
            -webkit-appearance: none; height: 18px; width: 18px; 
            background: var(--text-color); cursor: pointer; border-radius: 50%; margin-top: -7px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        input[type="range"]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: #e0e0e0; border-radius: 2px; }

        /* === CANVAS AREA === */
        .canvas-area {
            flex-grow: 1; display: flex; flex-direction: column; background-color: #eeeeee; position: relative; overflow: hidden;
        }

        .zoom-toolbar {
            position: absolute; top: 24px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 8px; background: rgba(255,255,255,0.9); padding: 6px;
            border-radius: var(--radius-round); box-shadow: 0 4px 15px rgba(0,0,0,0.05); z-index: 5;
            backdrop-filter: blur(5px);
        }
        .zoom-toolbar button {
            background: transparent; border: none; padding: 8px 16px; font-family: var(--font-main); 
            font-weight: 700; font-size: 12px; cursor: pointer; color: var(--text-color); border-radius: var(--radius-round);
            transition: background 0.2s;
        }
        .zoom-toolbar button:hover { background: #f0f0f0; }

        .canvas-container {
            flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 80px 20px 20px 20px; overflow: auto;
        }

        .canvas-wrapper {
            transition: transform 0.2s ease-out; transform-origin: center center;
            box-shadow: 0 15px 50px rgba(0,0,0,0.1); border-radius: 4px; overflow: hidden;
        }

        #art-canvas {
            display: block; max-width: 100%; max-height: 80vh; 
            cursor: crosshair; touch-action: none;
            background-color: white; 
        }

        /* === ACTION BAR === */
        .action-bar {
            padding: 24px; border-top: 1px solid var(--border-color); background-color: var(--panel-bg); 
            display: flex; gap: 16px; justify-content: flex-end; z-index: 10;
        }
        .btn { 
            padding: 12px 24px; font-family: var(--font-main); font-weight: 700; font-size: 13px; 
            cursor: pointer; border-radius: var(--radius-soft); transition: all 0.2s ease; border: none;
        }
        .btn-outline { background-color: var(--bg-color); color: var(--text-color); border: 1.5px solid var(--border-color); }
        .btn-outline:hover { background-color: #eaeaea; }
        .btn-solid { background-color: var(--text-color); color: white; border: 1.5px solid var(--text-color); }
        .btn-solid:hover { background-color: #333333; transform: translateY(-1px); box-shadow: 0 4px 10px rgba(0,0,0,0.15);}
        
        /* Botón de grabación */
        .btn-record { background-color: #333; color: white; }
        .btn-record.recording { background-color: #e74c3c; animation: pulse-red 1.5s infinite; }
        
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(231, 76, 60, 0); }
            100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
        }

        /* === NUEVO CSS PANEL COLOR TIPO ILLUSTRATOR === */
        #color-ui-container {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 10px;
            background: var(--bg-color);
            border-radius: var(--radius-soft);
            border: 1px solid var(--border-color);
            position: relative;
        }

        /* Swatches */
        #color-fill-swatch, #color-stroke-swatch {
            width: 50px;
            height: 50px;
            border: 1.5px solid var(--border-color);
            border-radius: 4px;
            cursor: pointer;
            position: relative;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        #color-fill-swatch:hover, #color-stroke-swatch:hover {
            border-color: var(--text-color);
        }

        /* Superposición */
        #color-fill-swatch {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 2;
        }

        #color-stroke-swatch {
            position: absolute;
            top: 40px;
            left: 40px;
            z-index: 1;
        }

        /* Espacio para la superposición */
        #color-ui-container {
            min-height: 110px; /* Asegura espacio para los cuadros superpuestos */
        }

        /* Indicador Activo */
        #color-fill-swatch.active-color, #color-stroke-swatch.active-color {
            border-color: var(--text-color);
            box-shadow: 0 0 0 2px var(--accent-color);
        }

        /* Inputs ocultos pero funcionales */
        #color-fill-swatch input, #color-stroke-swatch input {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            opacity: 0;
            cursor: pointer;
            z-index: 3;
        }

        /* Línea "Ninguno" */
        .none-line {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: transparent;
            z-index: 1;
            display: none; /* Oculto por defecto */
        }

        .none-line::after {
            content: '';
            position: absolute;
            top: 50%; left: 0;
            width: 100%; height: 2px;
            background: #e74c3c; /* Rojo de error/ninguno */
            transform: translateY(-50%) rotate(-45deg);
        }

        /* Mostrar línea "Ninguno" cuando esté inactivo */
        #color-fill-swatch.inactive-color .none-line,
        #color-stroke-swatch.inactive-color .none-line,
        .color-control-btn.inactive-color .none-line {
            display: block;
        }

        /* Color de fondo por defecto cuando es "Ninguno" */
        #color-fill-swatch.inactive-color,
        #color-stroke-swatch.inactive-color {
            background-color: white !important;
        }

        /* Botones de Control */
        #color-controls {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .color-control-btn {
            width: 24px;
            height: 24px;
            padding: 0;
            background: #eaeaea;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            transition: background 0.2s, color 0.2s, border-color 0.2s;
            position: relative;
        }

        .color-control-btn:hover {
            background: #f0f0f0;
            color: var(--text-color);
            border-color: var(--text-color);
        }

        .color-control-btn.inactive-color {
            background-color: white;
            color: #ccc;
            border-color: #eee;
        }

        .color-control-btn svg {
            fill: currentColor;
        }

        /* Ancho de contorno */
        #stroke-width-group {
            margin-top: 110px; /* Desplazar hacia abajo después de los swatches */
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <aside class="sidebar">
            <header class="header-brand">
                <h1>22-DDM</h1>
                <p>Experimental tool</p>
            </header>

            <section class="module-section">
                <h2 class="module-title">Tools & Shapes</h2>
                <div class="control-group">
                    <div style="display: flex; gap: 8px; margin-bottom: 10px;">
                        <button class="btn btn-solid tool-btn" id="tool-brush" style="flex: 1; padding: 10px 4px;">🖌️ Brush</button>
                        <button class="btn btn-outline tool-btn" id="tool-rect" style="flex: 1; padding: 10px 4px;">⬛ Rect</button>
                        <button class="btn btn-outline tool-btn" id="tool-ellipse" style="flex: 1; padding: 10px 4px;">⭕ Ellipse</button>
                    </div>
                    <p style="font-size: 10px; color: #777;">💡 For shapes: Click and drag. Hold <b>Shift</b> for perfect squares/circles.</p>
                </div>
            </section>

            <section class="module-section">
                <h2 class="module-title">1. Color & Style Settings</h2>
                
                <div class="control-group" id="brush-type-group">
                    <label>Brush Type (Only in Brush Mode)</label>
                    <select id="brush-type">
                        <option value="line">Continuous Line</option>
                        <option value="ant">Modular: Ants</option>
                        <option value="bee">Modular: Bees</option>
                        <option value="star">Modular: Stars</option>
                        <option value="square">Modular: Rough Squares</option>
                        <option value="dot">Modular: Dots</option>
                        <option value="disordered">Modular: Disordered Rectangles</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>Color & Stroke (Illustrator Style)</label>
                    <div id="color-ui-container">
                        <div id="color-fill-swatch" class="active-color">
                            <input type="color" id="fill-color-input" value="#111111">
                            <div class="none-line"></div>
                        </div>
                        <div id="color-stroke-swatch">
                            <input type="color" id="stroke-color-input" value="#ffffff">
                            <div class="none-line"></div>
                        </div>
                        <div id="color-controls">
                            <button class="color-control-btn" id="swap-colors-btn">
                                <svg viewBox="0 0 24 24" width="16" height="16"><path d="M19 14l-4 4-4-4h3V9c0-1.66-1.34-3-3-3s-3 1.34-3 3v2h-2V9c0-2.76 2.24-5 5-5s5 2.24 5 5v5h3z"/></svg>
                            </button>
                            <button class="color-control-btn" id="reset-colors-btn">
                                <svg viewBox="0 0 24 24" width="16" height="16"><path d="M12 2c5.52 0 10 4.48 10 10s-4.48 10-10 10-10-4.48-10-10 4.48-10 10-10zm0 18c4.41 0 8-3.59 8-8s-3.59-8-8-8-8 3.59-8 8 3.59 8 8 8zm0-10c1.1 0 2 .9 2 2s-.9 2-2 2-2-.9-2-2 .9-2 2-2z"/></svg>
                            </button>
                            <button class="color-control-btn" id="none-fill-btn" title="None (Fill)">
                                <div class="none-line"></div>
                            </button>
                            <button class="color-control-btn" id="none-stroke-btn" title="None (Stroke)">
                                <div class="none-line"></div>
                            </button>
                        </div>
                        <div id="stroke-width-group" style="margin-top: 10px; width: 100%;">
                            <label style="font-size: 10px; display: block; margin-bottom: 4px;">Outline Width</label>
                            <input type="range" id="outline-width" min="1" max="25" value="4">
                        </div>
                    </div>
                </div>

                <div class="control-group">
                    <label>Background Color</label>
                    <input type="color" id="bg-color" value="#bdf271">
                </div>
                
                <div class="control-group" id="brush-size-group">
                    <div class="flex-label">
                        <label>Brush Size / Thickness</label>
                        <label style="text-transform: none; font-size: 10px;">[ ] to adjust</label>
                    </div>
                    <input type="range" id="brush-size" min="5" max="100" value="25">
                </div>

                <div class="control-group">
                    <label>Object Spacing (Modular)</label>
                    <input type="range" id="brush-spacing" min="1" max="150" value="30">
                </div>

                <div class="control-group" id="brush-fidelity-group">
                    <div class="flex-label">
                        <label>Fidelity (Line Smoother)</label>
                        <label>Smooth &rarr; Accurate</label>
                    </div>
                    <input type="range" id="stroke-fidelity" min="1" max="100" value="70">
                    <p style="font-size: 10px; color: #777; margin-top: 6px;">💡 Hold <b>Shift</b> while drawing for 45°/90° lines.</p>
                </div>
            </section>

            <section class="module-section">
                <h2 class="module-title">2. Special Effects</h2>
                
                <div class="control-group">
                    <label>Blur Intensity</label>
                    <input type="range" id="brush-blur" min="0" max="20" value="0">
                </div>

                <div class="control-group">
                    <label>Motion Effect</label>
                    <select id="motion-type">
                        <option value="none">Static</option>
                        <option value="vibrate">Vibration</option>
                        <option value="pulse">Pulse</option>
                        <option value="wave">Wave</option>
                        <option value="gravity">Gravity</option>
                    </select>
                </div>
            </section>

            <section class="module-section" style="border-bottom: none;">
                <h2 class="module-title">3. Canvas Format</h2>
                <div class="control-group">
                    <label>Canvas Orientation</label>
                    <select id="canvas-format">
                        <option value="3:4">Vertical 3:4</option>
                        <option value="16:9">Horizontal 16:9</option>
                    </select>
                </div>
            </section>
        </aside>

        <main class="canvas-area">
            <div class="zoom-toolbar">
                <button id="btn-zoom-out">Zoom Out</button>
                <button id="btn-zoom-fit">Fit Screen</button>
                <button id="btn-zoom-in">Zoom In</button>
            </div>

            <div class="canvas-container" id="canvas-container">
                <div class="canvas-wrapper" id="canvas-wrapper">
                    <canvas id="art-canvas"></canvas>
                </div>
            </div>

            <div class="action-bar">
                <button class="btn btn-outline" id="btn-clear">Clear Canvas</button>
                <button class="btn btn-solid" id="btn-export">Export Image (PNG)</button>
                <button class="btn btn-record" id="btn-record">Record Animation</button>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('art-canvas');
            const ctx = canvas.getContext('2d'); 
            const canvasWrapper = document.getElementById('canvas-wrapper');
            
            let isDrawing = false;
            let currentZoom = 1;
            let needsRedraw = true; 
            let currentMode = 'brush'; // 'brush', 'rect', 'ellipse'
            
            const paths = []; 
            const redoStack = []; 
            let rawPointsBuffer = []; 

            let mediaRecorder;
            let recordedChunks = [];
            let isRecording = false;

            // Nuevo objeto de estado de color
            let colorState = {
                activeMode: 'fill', 
                fill: {
                    color: '#111111',
                    active: true
                },
                stroke: {
                    color: '#ffffff',
                    active: false,
                    width: 4
                }
            };

            // UI Elements
            const brushTypeInput = document.getElementById('brush-type');
            const bgColorInput = document.getElementById('bg-color');
            const brushSizeInput = document.getElementById('brush-size');
            const brushSpacingInput = document.getElementById('brush-spacing');
            const strokeFidelityInput = document.getElementById('stroke-fidelity');
            const brushBlurInput = document.getElementById('brush-blur');
            const motionTypeInput = document.getElementById('motion-type');
            const formatSelect = document.getElementById('canvas-format');
            const btnClear = document.getElementById('btn-clear');
            const btnExport = document.getElementById('btn-export');
            const btnRecord = document.getElementById('btn-record'); 
            
            // Nuevos elementos UI
            const fillSwatch = document.getElementById('color-fill-swatch');
            const strokeSwatch = document.getElementById('color-stroke-swatch');
            const fillColorInput = document.getElementById('fill-color-input');
            const strokeColorInput = document.getElementById('stroke-color-input');
            const outlineWidthInput = document.getElementById('outline-width');
            const swapColorsBtn = document.getElementById('swap-colors-btn');
            const resetColorsBtn = document.getElementById('reset-colors-btn');
            const noneFillBtn = document.getElementById('none-fill-btn');
            const noneStrokeBtn = document.getElementById('none-stroke-btn');

            // Tool Buttons
            const toolButtons = document.querySelectorAll('.tool-btn');
            
            toolButtons.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    toolButtons.forEach(b => {
                        b.classList.remove('btn-solid');
                        b.classList.add('btn-outline');
                    });
                    e.target.classList.remove('btn-outline');
                    e.target.classList.add('btn-solid');
                    currentMode = e.target.id.replace('tool-', '');
                    
                    // Atenuar configuraciones específicas del pincel si se selecciona una forma
                    const opacity = currentMode === 'brush' ? '1' : '0.4';
                    document.getElementById('brush-type-group').style.opacity = opacity;
                    document.getElementById('brush-size-group').style.opacity = opacity;
                    document.getElementById('brush-fidelity-group').style.opacity = opacity;
                });
            });

            function initCanvas() {
                const format = formatSelect.value;
                if(format === '3:4') {
                    canvas.width = 1200; canvas.height = 1600;
                    canvas.style.aspectRatio = "3/4";
                    canvas.style.maxHeight = "80vh"; canvas.style.maxWidth = "auto";
                } else {
                    canvas.width = 1920; canvas.height = 1080;
                    canvas.style.aspectRatio = "16/9";
                    canvas.style.maxHeight = "auto"; canvas.style.maxWidth = "80vw";
                }
                resetZoom();
                updateColorUI(); // Inicializar UI de color
                needsRedraw = true;
            }

            function fillBackground() {
                ctx.fillStyle = bgColorInput.value;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            function getCoordinates(e) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;   
                const scaleY = canvas.height / rect.height; 
                return {
                    x: (e.clientX - rect.left) * scaleX,
                    y: (e.clientY - rect.top) * scaleY
                };
            }

            // Función para sincronizar la interfaz de color con el estado
            function updateColorUI() {
                // Actualizar colores de swatches
                fillSwatch.style.backgroundColor = colorState.fill.active ? colorState.fill.color : 'white';
                strokeSwatch.style.backgroundColor = colorState.stroke.active ? colorState.stroke.color : 'white';

                // Actualizar inputs ocultos
                fillColorInput.value = colorState.fill.color;
                strokeColorInput.value = colorState.stroke.color;

                // Actualizar indicador de modo activo
                fillSwatch.classList.remove('active-color');
                strokeSwatch.classList.remove('active-color');
                if (colorState.activeMode === 'fill') fillSwatch.classList.add('active-color');
                else strokeSwatch.classList.add('active-color');

                // Actualizar líneas "Ninguno"
                fillSwatch.classList.toggle('inactive-color', !colorState.fill.active);
                strokeSwatch.classList.toggle('inactive-color', !colorState.stroke.active);
                noneFillBtn.classList.toggle('inactive-color', !colorState.fill.active);
                noneStrokeBtn.classList.toggle('inactive-color', !colorState.stroke.active);

                // Actualizar ancho de contorno
                outlineWidthInput.value = colorState.stroke.width;
                
                // Forzar redibujado
                needsRedraw = true;
            }

            // --- Lógica de la interfaz de color ---

            fillSwatch.addEventListener('click', () => {
                colorState.activeMode = 'fill';
                updateColorUI();
            });

            strokeSwatch.addEventListener('click', () => {
                colorState.activeMode = 'stroke';
                updateColorUI();
            });

            fillColorInput.addEventListener('input', (e) => {
                colorState.fill.color = e.target.value;
                colorState.fill.active = true; 
                colorState.activeMode = 'fill'; 
                updateColorUI();
            });

            strokeColorInput.addEventListener('input', (e) => {
                colorState.stroke.color = e.target.value;
                colorState.stroke.active = true; 
                colorState.activeMode = 'stroke'; 
                updateColorUI();
            });

            outlineWidthInput.addEventListener('input', (e) => {
                colorState.stroke.width = parseInt(e.target.value);
                needsRedraw = true;
            });

            swapColorsBtn.addEventListener('click', () => {
                const tempColor = colorState.fill.color;
                colorState.fill.color = colorState.stroke.color;
                colorState.stroke.color = tempColor;

                const tempActive = colorState.fill.active;
                colorState.fill.active = colorState.stroke.active;
                colorState.stroke.active = tempActive;

                updateColorUI();
            });

            resetColorsBtn.addEventListener('click', () => {
                colorState.fill = { color: '#111111', active: true };
                colorState.stroke = { color: '#ffffff', active: false, width: 4 };
                updateColorUI();
            });

            noneFillBtn.addEventListener('click', () => {
                colorState.fill.active = false;
                colorState.activeMode = 'fill';
                updateColorUI();
            });

            noneStrokeBtn.addEventListener('click', () => {
                colorState.stroke.active = false;
                colorState.activeMode = 'stroke';
                updateColorUI();
            });

            // --- Fin lógica color ---

            function startPosition(e) {
                isDrawing = true;
                needsRedraw = true;
                redoStack.length = 0; 
                
                const coords = getCoordinates(e);
                
                if (currentMode === 'brush') {
                    rawPointsBuffer = [[coords.x, coords.y]]; 
                    paths.push({
                        mode: 'brush',
                        type: brushTypeInput.value,
                        // Usar colorState
                        color: colorState.fill.active ? colorState.fill.color : 'transparent',
                        size: parseInt(brushSizeInput.value),
                        spacing: 30, 
                        fidelity: parseInt(strokeFidelityInput.value),
                        blur: parseInt(brushBlurInput.value),
                        // Usar colorState
                        hasOutline: colorState.stroke.active,
                        outlineColor: colorState.stroke.color,
                        outlineWidth: colorState.stroke.width,
                        points: [], 
                        stamps: [], 
                        lastStampPoint: null,
                        origin: [coords.x, coords.y], 
                        createdAt: performance.now() 
                    });
                } else {
                    // Modo Forma (Shape Mode)
                    paths.push({
                        mode: 'shape',
                        type: currentMode, // 'rect' or 'ellipse'
                        // Usar colorState
                        color: colorState.fill.active ? colorState.fill.color : 'transparent',
                        blur: parseInt(brushBlurInput.value),
                        // Usar colorState
                        hasOutline: colorState.stroke.active,
                        outlineColor: colorState.stroke.color,
                        outlineWidth: colorState.stroke.width,
                        origin: [coords.x, coords.y],
                        end: [coords.x, coords.y],
                        createdAt: performance.now() 
                    });
                }
            }

            function endPosition() {
                isDrawing = false;
                needsRedraw = true; 
            }

            function draw(e) {
                if (!isDrawing) return;
                e.preventDefault();
                needsRedraw = true;

                const currentPath = paths[paths.length - 1];
                const coords = getCoordinates(e);
                
                let rawX = coords.x;
                let rawY = coords.y;

                if (currentMode === 'brush') {
                    if (e.shiftKey) {
                        const startX = currentPath.origin[0];
                        const startY = currentPath.origin[1];
                        const dx = rawX - startX;
                        const dy = rawY - startY;
                        const angle = Math.atan2(dy, dx);
                        const snapAngle = Math.round(angle / (Math.PI / 4)) * (Math.PI / 4);
                        const dist = Math.hypot(dx, dy);
                        rawX = startX + Math.cos(snapAngle) * dist;
                        rawY = startY + Math.sin(snapAngle) * dist;
                    }
                    
                    rawPointsBuffer.push([rawX, rawY]);

                    const fidelityVal = 101 - currentPath.fidelity; 
                    const lookbackCount = Math.max(1, Math.floor(fidelityVal / 5)); 
                    let smoothX = rawX;
                    let smoothY = rawY;

                    if (rawPointsBuffer.length > 1) {
                        const bufferToAverage = rawPointsBuffer.slice(-lookbackCount);
                        smoothX = bufferToAverage.reduce((sum, p) => sum + p[0], 0) / bufferToAverage.length;
                        smoothY = bufferToAverage.reduce((sum, p) => sum + p[1], 0) / bufferToAverage.length;
                    }

                    currentPath.points.push([smoothX, smoothY]);

                    if (currentPath.type !== 'line') {
                        if (!currentPath.lastStampPoint) {
                            currentPath.lastStampPoint = [smoothX, smoothY];
                            currentPath.stamps.push({ x: smoothX, y: smoothY, angle: 0, seed: 0 });
                        } else {
                            let lastX = currentPath.lastStampPoint[0];
                            let lastY = currentPath.lastStampPoint[1];
                            let dist = Math.hypot(smoothX - lastX, smoothY - lastY);
                            
                            if (dist >= currentPath.spacing) {
                                let stampsCount = Math.floor(dist / currentPath.spacing);
                                for (let j = 1; j <= stampsCount; j++) {
                                    let nextX = lastX + (smoothX - lastX) * (j / stampsCount);
                                    let nextY = lastY + (smoothY - lastY) * (j / stampsCount);
                                    let angle = Math.atan2(smoothY - lastY, smoothX - lastX);
                                    let seed = (currentPath.points.length * 100) + j;
                                    currentPath.stamps.push({ x: nextX, y: nextY, angle: angle, seed: seed });
                                }
                                currentPath.lastStampPoint = [smoothX, smoothY];
                            }
                        }
                    }
                } else {
                    // Actualizar Coordenadas de Forma
                    if (e.shiftKey) {
                        let w = rawX - currentPath.origin[0];
                        let h = rawY - currentPath.origin[1];
                        let size = Math.max(Math.abs(w), Math.abs(h));
                        w = Math.sign(w) * size;
                        h = Math.sign(h) * size;
                        rawX = currentPath.origin[0] + w;
                        rawY = currentPath.origin[1] + h;
                    }
                    currentPath.end = [rawX, rawY];
                }
            }

            function renderAllPaths() {
                requestAnimationFrame(renderAllPaths);

                const motionType = motionTypeInput.value;
                
                if (motionType === 'none' && !isDrawing && !needsRedraw && !isRecording) {
                    return; 
                }

                ctx.save();
                fillBackground();

                paths.forEach(renderPath);

                ctx.restore();

                if (motionType === 'none' && !isDrawing) {
                    needsRedraw = false;
                }
            }

            function renderPath(path) {
                if (path.mode === 'brush' && path.points.length < 1) return;

                const motionType = motionTypeInput.value;
                const time = performance.now();

                let currentSize = path.size || 0;
                
                ctx.save();

                // Físicas Generales
                if (motionType === 'pulse') {
                    const pulseFreq = 0.003;
                    const scaleFactor = 1 + (Math.sin(time * pulseFreq) * 0.3); 
                    if(path.mode === 'brush') currentSize = path.size * scaleFactor;
                } 
                else if (motionType === 'vibrate') {
                    const vibX = (Math.random() - 0.5) * 5;
                    const vibY = (Math.random() - 0.5) * 5;
                    ctx.translate(vibX, vibY);
                }
                else if (motionType === 'wave') {
                    const waveX = Math.sin(time * 0.002 + path.createdAt) * 8;
                    const waveY = Math.cos(time * 0.0015 + path.createdAt) * 8;
                    ctx.translate(waveX, waveY);
                }
                else if (motionType === 'gravity') {
                    const age = Math.max(0, time - path.createdAt);
                    ctx.translate(0, age * 0.02);
                }
                
                if (path.blur > 0) ctx.filter = `blur(${path.blur}px)`;
                
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';

                // Dibujar Forma
                if (path.mode === 'shape') {
                    ctx.fillStyle = path.color; // Esto es 'transparent' si se desactivó el relleno
                    let w = path.end[0] - path.origin[0];
                    let h = path.end[1] - path.origin[1];

                    if (path.type === 'rect') {
                        // Sólo rellenar si el color no es transparente
                        if(path.color !== 'transparent') ctx.fillRect(path.origin[0], path.origin[1], w, h);
                        
                        if (path.hasOutline) {
                            ctx.lineWidth = path.outlineWidth; ctx.strokeStyle = path.outlineColor;
                            ctx.strokeRect(path.origin[0], path.origin[1], w, h);
                        }
                    } else if (path.type === 'ellipse') {
                        let cx = path.origin[0] + w / 2;
                        let cy = path.origin[1] + h / 2;
                        let rx = Math.abs(w / 2);
                        let ry = Math.abs(h / 2);
                        
                        ctx.beginPath();
                        ctx.ellipse(cx, cy, rx, ry, 0, 0, 2 * Math.PI);
                        
                        // Sólo rellenar si el color no es transparente
                        if(path.color !== 'transparent') ctx.fill();
                        
                        if (path.hasOutline) {
                            ctx.lineWidth = path.outlineWidth; ctx.strokeStyle = path.outlineColor;
                            ctx.stroke();
                        }
                    }
                    ctx.restore();
                    return;
                }

                // Dibujar Pincel (Con lógica transparente para modular)
                if (path.type === 'line') {
                    if (path.hasOutline) {
                        ctx.lineWidth = currentSize + (path.outlineWidth * 2); ctx.strokeStyle = path.outlineColor;
                        ctx.beginPath(); ctx.moveTo(path.points[0][0], path.points[0][1]);
                        for(let i = 1; i < path.points.length; i++) ctx.lineTo(path.points[i][0], path.points[i][1]);
                        ctx.stroke();
                    }
                    ctx.lineWidth = currentSize;
                    ctx.strokeStyle = path.color; // Esto es 'transparent' si se desactivó el relleno
                    ctx.beginPath(); ctx.moveTo(path.points[0][0], path.points[0][1]);
                    for(let i = 1; i < path.points.length; i++) ctx.lineTo(path.points[i][0], path.points[i][1]);
                    
                    // Sólo trazar línea si el color no es transparente
                    if(path.color !== 'transparent') ctx.stroke();
                    
                } else if (path.stamps) {
                    for(let i = 0; i < path.stamps.length; i++) {
                        let s = path.stamps[i];
                        drawStampOnPoint(path, s.x, s.y, s.angle, currentSize, s.seed);
                    }
                }
                
                ctx.restore();
            }

            function drawStampOnPoint(path, x, y, angle, size, seedBase) {
                const type = path.type;
                ctx.save(); ctx.translate(x, y);
                
                if(type === 'ant' || type === 'bee') ctx.rotate(angle + Math.PI / 2); 
                else if(type === 'star' || type === 'square') ctx.rotate(angle); 

                if(type === 'dot') {
                    ctx.beginPath(); ctx.arc(0, 0, size/2, 0, Math.PI * 2); 
                    // Sólo rellenar si el color no es transparente
                    if(path.color !== 'transparent') { ctx.fillStyle = path.color; ctx.fill(); }
                    if(path.hasOutline) strokeShape(path);
                } else if (type === 'square') {
                    for(let i = 0; i < 3; i++) {
                        ctx.save();
                        let rA = Math.sin(seedBase + i * 10) * 0.5 + 0.5; 
                        let rB = Math.cos(seedBase + i * 20) * 0.5 + 0.5;
                        const randomRot = (rA - 0.5) * 0.8;
                        const posOffX = (rA - 0.5) * size * 0.4;
                        const posOffY = (rB - 0.5) * size * 0.4;
                        
                        ctx.rotate(randomRot);
                        // Sólo rellenar si el color no es transparente
                        if(path.color !== 'transparent') { ctx.fillStyle = path.color; ctx.fillRect(-(size/2) + posOffX, -(size/2) + posOffY, size, size); }
                        if(path.hasOutline) { ctx.lineWidth = path.outlineWidth; ctx.strokeStyle = path.outlineColor; ctx.strokeRect(-(size/2) + posOffX, -(size/2) + posOffY, size, size); }
                        ctx.restore();
                    }
                } else if (type === 'star') {
                    drawStar(0, 0, 5, size/2, size/4);
                    // Sólo rellenar si el color no es transparente
                    if(path.color !== 'transparent') { ctx.fillStyle = path.color; ctx.fill(); }
                    if(path.hasOutline) strokeShape(path);
                } else if (type === 'ant' || type === 'bee') {
                    const emoji = type === 'ant' ? "🐜" : "🐝";
                    ctx.font = `${size}px sans-serif`; ctx.textAlign = "center"; ctx.textBaseline = "middle"; 
                    if(path.hasOutline) { ctx.lineWidth = path.outlineWidth; ctx.strokeStyle = path.outlineColor; ctx.strokeText(emoji, 0, 0); }
                    // Sólo rellenar emoji si el color no es transparente
                    if(path.color !== 'transparent') { ctx.fillStyle = path.color; ctx.fillText(emoji, 0, 0); }
                } else if (type === 'disordered') {
                    for(let i = 0; i < 5; i++) {
                        ctx.save();
                        let rA = Math.abs(Math.sin(seedBase + i * 13));
                        let rB = Math.abs(Math.cos(seedBase + i * 17));
                        const randomW = size * (0.8 + rA * 0.4);
                        const randomH = size * (0.4 + rB * 1.5);
                        const posOffX = (rA - 0.5) * size * 0.3;
                        const posOffY = (rB - 0.5) * size * 0.3;
                        
                        // Sólo rellenar si el color no es transparente
                        if(path.color !== 'transparent') { ctx.fillStyle = path.color; ctx.fillRect(-(randomW/2) + posOffX, -(randomH/2) + posOffY, randomW, randomH); }
                        if(path.hasOutline) { ctx.lineWidth = path.outlineWidth; ctx.strokeStyle = path.outlineColor; ctx.strokeRect(-(randomW/2) + posOffX, -(randomH/2) + posOffY, randomW, randomH); }
                        ctx.restore();
                    }
                }
                ctx.restore();
            }
            
            function strokeShape(path) {
                ctx.lineWidth = path.outlineWidth;
                ctx.strokeStyle = path.outlineColor;
                ctx.lineJoin = 'miter'; 
                ctx.stroke();
            }

            function drawStar(cx, cy, spikes, outerRadius, innerRadius) {
                let rot = Math.PI / 2 * 3;
                let step = Math.PI / spikes;
                ctx.beginPath();
                ctx.moveTo(cx, cy - outerRadius);
                for (let i = 0; i < spikes; i++) {
                    ctx.lineTo(cx + Math.cos(rot) * outerRadius, cy + Math.sin(rot) * outerRadius);
                    rot += step;
                    ctx.lineTo(cx + Math.cos(rot) * innerRadius, cy + Math.sin(rot) * innerRadius);
                    rot += step;
                }
                ctx.closePath();
            }

            function exportImage() {
                const dataURL = canvas.toDataURL('image/png', 1.0);
                const link = document.createElement('a');
                link.download = `22-DDM_Static_${new Date().getTime()}.png`;
                link.href = dataURL;
                link.click();
            }

            function toggleRecording() {
                if (isRecording) {
                    mediaRecorder.stop();
                    isRecording = false;
                    btnRecord.textContent = 'Record Animation';
                    btnRecord.classList.remove('recording');
                } else {
                    const stream = canvas.captureStream(60); 
                    mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
                    recordedChunks = [];
                    
                    mediaRecorder.ondataavailable = function(e) {
                        if (e.data.size > 0) recordedChunks.push(e.data);
                    };
                    
                    mediaRecorder.onstop = function() {
                        const blob = new Blob(recordedChunks, { type: 'video/webm' });
                        const url = URL.createObjectURL(blob);
                        const link = document.createElement('a');
                        link.download = `22-DDM_Animated_${new Date().getTime()}.webm`;
                        link.href = url;
                        link.click();
                        URL.revokeObjectURL(url); 
                    };
                    
                    mediaRecorder.start();
                    isRecording = true;
                    btnRecord.textContent = 'Stop Recording...';
                    btnRecord.classList.add('recording');
                    needsRedraw = true; 
                }
            }

            canvas.addEventListener('pointerdown', startPosition);
            canvas.addEventListener('pointerup', endPosition);
            canvas.addEventListener('pointermove', draw);
            canvas.addEventListener('pointerleave', endPosition);
            canvas.addEventListener('pointercancel', endPosition);

            document.addEventListener('keydown', (e) => {
                const isMac = navigator.platform.toUpperCase().indexOf('MAC') >= 0;
                const modifier = isMac ? e.metaKey : e.ctrlKey;

                if (modifier && e.key === 'z' && !e.shiftKey) {
                    e.preventDefault(); 
                    if (paths.length > 0) {
                        redoStack.push(paths.pop()); 
                        needsRedraw = true; 
                    }
                }
                
                if ((modifier && e.shiftKey && e.key === 'z') || (modifier && e.key === 'y')) {
                    e.preventDefault();
                    if (redoStack.length > 0) {
                        paths.push(redoStack.pop());
                        needsRedraw = true;
                    }
                }

                if (e.key === '[') {
                    let newVal = Math.max(parseInt(brushSizeInput.min), parseInt(brushSizeInput.value) - 2);
                    brushSizeInput.value = newVal;
                }
                if (e.key === ']') {
                    let newVal = Math.min(parseInt(brushSizeInput.max), parseInt(brushSizeInput.value) + 2);
                    brushSizeInput.value = newVal;
                }
            });

            formatSelect.addEventListener('change', initCanvas);
            bgColorInput.addEventListener('input', () => { needsRedraw = true; });
            motionTypeInput.addEventListener('change', () => { needsRedraw = true; });
            btnClear.addEventListener('click', () => { 
                paths.length = 0; 
                redoStack.length = 0; 
                needsRedraw = true; 
            }); 
            btnExport.addEventListener('click', exportImage);
            btnRecord.addEventListener('click', toggleRecording); 

            function applyZoom() { canvasWrapper.style.transform = `scale(${currentZoom})`; }
            function resetZoom() { currentZoom = 1; applyZoom(); }
            document.getElementById('btn-zoom-in').addEventListener('click', () => { currentZoom += 0.2; applyZoom(); });
            document.getElementById('btn-zoom-out').addEventListener('click', () => { if(currentZoom > 0.4) { currentZoom -= 0.2; applyZoom(); } });
            document.getElementById('btn-zoom-fit').addEventListener('click', resetZoom);

            initCanvas();
            requestAnimationFrame(renderAllPaths); 
        });
    </script>
</body>
</html>
