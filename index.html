<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>22-DDM</title>
    <style>
        /* === VARIABLES & TYPOGRAPHY === */
        :root {
            --bg-color: #f7f7f7;
            --panel-bg: #ffffff;
            --text-color: #111111;
            --border-color: #d1d1d1;
            --accent-color: #bdf271; 
            --font-main: 'Acumin Pro', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            --radius-soft: 12px; 
            --radius-round: 50px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
            font-size: 14px;
            -webkit-font-smoothing: antialiased;
        }

        .app-container { display: flex; width: 100%; height: 100%; }

        /* === SIDEBAR === */
        .sidebar {
            width: 340px; min-width: 340px; height: 100%;
            border-right: 1px solid var(--border-color);
            display: flex; flex-direction: column;
            background-color: var(--panel-bg); overflow-y: auto; z-index: 10;
            box-shadow: 2px 0 15px rgba(0,0,0,0.03);
        }

        .header-brand {
            padding: 24px; border-bottom: 1px solid var(--border-color);
            background-color: var(--panel-bg);
        }

        .header-brand h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
        .header-brand p { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #666; margin-top: 4px; }

        .module-section { padding: 24px; border-bottom: 1px solid var(--border-color); }
        .module-title { font-size: 13px; font-weight: 700; text-transform: uppercase; margin-bottom: 18px; letter-spacing: 0.5px; color: #333;}

        /* === UI CONTROLS === */
        .control-group { margin-bottom: 18px; }
        .control-group label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; margin-bottom: 8px; color: #555; }
        .flex-label { display: flex; justify-content: space-between; align-items: center; }
        
        /* Checkbox styling */
        .checkbox-group { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
        .checkbox-group input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; accent-color: var(--text-color); }
        .checkbox-group label { margin-bottom: 0; cursor: pointer; }

        select, input[type="color"] {
            width: 100%; padding: 12px; border: 1.5px solid var(--border-color);
            background: var(--bg-color); font-family: var(--font-main); font-size: 13px; font-weight: 500;
            cursor: pointer; outline: none; border-radius: var(--radius-soft);
            transition: border-color 0.2s ease;
        }
        
        select:focus { border-color: var(--text-color); }
        
        select {
            appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg fill="%23333" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/></svg>');
            background-repeat: no-repeat; background-position-x: 96%; background-position-y: 50%;
        }

        input[type="color"] { height: 44px; padding: 4px; }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; border-radius: 6px;}
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 6px; }

        input[type="range"] { -webkit-appearance: none; width: 100%; background: transparent; margin-top: 6px; }
        input[type="range"]::-webkit-slider-thumb { 
            -webkit-appearance: none; height: 18px; width: 18px; 
            background: var(--text-color); cursor: pointer; border-radius: 50%; margin-top: -7px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        input[type="range"]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: #e0e0e0; border-radius: 2px; }

        /* === CANVAS AREA === */
        .canvas-area {
            flex-grow: 1; display: flex; flex-direction: column; background-color: #eeeeee; position: relative; overflow: hidden;
        }

        .zoom-toolbar {
            position: absolute; top: 24px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 8px; background: rgba(255,255,255,0.9); padding: 6px;
            border-radius: var(--radius-round); box-shadow: 0 4px 15px rgba(0,0,0,0.05); z-index: 5;
            backdrop-filter: blur(5px);
        }
        .zoom-toolbar button {
            background: transparent; border: none; padding: 8px 16px; font-family: var(--font-main); 
            font-weight: 700; font-size: 12px; cursor: pointer; color: var(--text-color); border-radius: var(--radius-round);
            transition: background 0.2s;
        }
        .zoom-toolbar button:hover { background: #f0f0f0; }

        .canvas-container {
            flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 80px 20px 20px 20px; overflow: auto;
        }

        .canvas-wrapper {
            transition: transform 0.2s ease-out; transform-origin: center center;
            box-shadow: 0 15px 50px rgba(0,0,0,0.1); border-radius: 4px; overflow: hidden;
        }

        #art-canvas {
            display: block; max-width: 100%; max-height: 80vh; 
            cursor: crosshair; touch-action: none;
            background-color: white; 
        }

        /* === ACTION BAR === */
        .action-bar {
            padding: 24px; border-top: 1px solid var(--border-color); background-color: var(--panel-bg); 
            display: flex; gap: 16px; justify-content: flex-end; z-index: 10;
        }
        .btn { 
            padding: 12px 24px; font-family: var(--font-main); font-weight: 700; font-size: 13px; 
            cursor: pointer; border-radius: var(--radius-soft); transition: all 0.2s ease; border: none;
        }
        .btn-outline { background-color: var(--bg-color); color: var(--text-color); border: 1.5px solid var(--border-color); }
        .btn-outline:hover { background-color: #eaeaea; }
        .btn-solid { background-color: var(--text-color); color: white; }
        .btn-solid:hover { background-color: #333333; transform: translateY(-1px); box-shadow: 0 4px 10px rgba(0,0,0,0.15);}
    </style>
</head>
<body>

    <div class="app-container">
        
        <aside class="sidebar">
            <header class="header-brand">
                <h1>22-DDM</h1>
                <p>Experimental tool</p>
            </header>

            <section class="module-section">
                <h2 class="module-title">1. Brush Settings</h2>
                
                <div class="control-group">
                    <label>Brush Type</label>
                    <select id="brush-type">
                        <option value="line">Continuous Line</option>
                        <option value="ant">Modular: Ants</option>
                        <option value="bee">Modular: Bees</option>
                        <option value="star">Modular: Stars</option>
                        <option value="square">Modular: Rough Squares</option>
                        <option value="dot">Modular: Dots</option>
                        <option value="disordered">Modular: Disordered Rectangles</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>Brush Color (Fill)</label>
                    <input type="color" id="brush-color" value="#111111">
                </div>

                <div class="control-group">
                    <label>Background Color</label>
                    <input type="color" id="bg-color" value="#bdf271">
                </div>
                
                <div class="control-group">
                    <label>Size / Thickness</label>
                    <input type="range" id="brush-size" min="5" max="100" value="25">
                </div>

                <div class="control-group" style="background: var(--bg-color); padding: 12px; border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="checkbox-group">
                        <input type="checkbox" id="enable-outline">
                        <label for="enable-outline">Enable Stroke Outline</label>
                    </div>
                    <div style="margin-bottom: 8px;">
                        <label style="font-size: 10px;">Outline Color</label>
                        <input type="color" id="outline-color" value="#ffffff" style="height: 36px;">
                    </div>
                    <div>
                        <label style="font-size: 10px;">Outline Width</label>
                        <input type="range" id="outline-width" min="1" max="25" value="4">
                    </div>
                </div>

                <div class="control-group">
                    <label>Object Spacing (Modular)</label>
                    <input type="range" id="brush-spacing" min="1" max="150" value="30">
                </div>

                <div class="control-group">
                    <div class="flex-label">
                        <label>Fidelity (Line Smoother)</label>
                        <label>Smooth &rarr; Accurate</label>
                    </div>
                    <input type="range" id="stroke-fidelity" min="1" max="100" value="70">
                </div>
            </section>

            <section class="module-section">
                <h2 class="module-title">2. Special Effects</h2>
                
                <div class="control-group">
                    <label>Blur Intensity</label>
                    <input type="range" id="brush-blur" min="0" max="20" value="0">
                </div>

                <div class="control-group">
                    <label>Stroke Motion Effect</label>
                    <select id="motion-type">
                        <option value="none">None (Static)</option>
                        <option value="vibrate">Vibration (Jitter)</option>
                        <option value="pulse">Pulse</option>
                    </select>
                </div>
            </section>

            <section class="module-section" style="border-bottom: none;">
                <h2 class="module-title">3. Canvas Format</h2>
                <div class="control-group">
                    <label>Canvas Orientation</label>
                    <select id="canvas-format">
                        <option value="3:4">Vertical 3:4</option>
                        <option value="16:9">Horizontal 16:9</option>
                    </select>
                </div>
            </section>
        </aside>

        <main class="canvas-area">
            <div class="zoom-toolbar">
                <button id="btn-zoom-out">Zoom Out</button>
                <button id="btn-zoom-fit">Fit Screen</button>
                <button id="btn-zoom-in">Zoom In</button>
            </div>

            <div class="canvas-container" id="canvas-container">
                <div class="canvas-wrapper" id="canvas-wrapper">
                    <canvas id="art-canvas"></canvas>
                </div>
            </div>

            <div class="action-bar">
                <button class="btn btn-outline" id="btn-clear">Clear Canvas</button>
                <button class="btn btn-solid" id="btn-export">Export Artwork</button>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('art-canvas');
            const ctx = canvas.getContext('2d'); 
            const canvasWrapper = document.getElementById('canvas-wrapper');
            
            let isDrawing = false;
            let currentZoom = 1;
            let needsRedraw = true; 
            
            const paths = []; 
            let rawPointsBuffer = []; 

            // UI Elements
            const brushTypeInput = document.getElementById('brush-type');
            const brushColorInput = document.getElementById('brush-color');
            const bgColorInput = document.getElementById('bg-color'); // Fondo movido
            const brushSizeInput = document.getElementById('brush-size');
            const brushSpacingInput = document.getElementById('brush-spacing');
            const strokeFidelityInput = document.getElementById('stroke-fidelity');
            const brushBlurInput = document.getElementById('brush-blur');
            const motionTypeInput = document.getElementById('motion-type');
            const formatSelect = document.getElementById('canvas-format');
            const btnClear = document.getElementById('btn-clear');
            const btnExport = document.getElementById('btn-export');
            
            // Stroke Elements
            const enableOutlineInput = document.getElementById('enable-outline');
            const outlineColorInput = document.getElementById('outline-color');
            const outlineWidthInput = document.getElementById('outline-width');

            function initCanvas() {
                const format = formatSelect.value;
                if(format === '3:4') {
                    canvas.width = 1200; canvas.height = 1600;
                    canvas.style.aspectRatio = "3/4";
                    canvas.style.maxHeight = "80vh"; canvas.style.maxWidth = "auto";
                } else {
                    canvas.width = 1920; canvas.height = 1080;
                    canvas.style.aspectRatio = "16/9";
                    canvas.style.maxHeight = "auto"; canvas.style.maxWidth = "80vw";
                }
                resetZoom();
                needsRedraw = true;
            }

            function fillBackground() {
                ctx.fillStyle = bgColorInput.value;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            function getCoordinates(e) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;   
                const scaleY = canvas.height / rect.height; 
                return {
                    x: (e.clientX - rect.left) * scaleX,
                    y: (e.clientY - rect.top) * scaleY
                };
            }

            function startPosition(e) {
                isDrawing = true;
                needsRedraw = true;
                const coords = getCoordinates(e);
                rawPointsBuffer = [[coords.x, coords.y]]; 
                
                // Guardar las propiedades completas del trazo actual
                paths.push({
                    type: brushTypeInput.value,
                    color: brushColorInput.value,
                    size: parseInt(brushSizeInput.value),
                    spacing: parseInt(brushSpacingInput.value),
                    fidelity: parseInt(strokeFidelityInput.value),
                    blur: parseInt(brushBlurInput.value),
                    hasOutline: enableOutlineInput.checked,
                    outlineColor: outlineColorInput.value,
                    outlineWidth: parseInt(outlineWidthInput.value),
                    points: [], 
                    stamps: [], 
                    lastStampPoint: null 
                });
            }

            function endPosition() {
                isDrawing = false;
                needsRedraw = true; 
            }

            function draw(e) {
                if (!isDrawing) return;
                e.preventDefault();
                needsRedraw = true;

                const coords = getCoordinates(e);
                const rawX = coords.x;
                const rawY = coords.y;
                
                rawPointsBuffer.push([rawX, rawY]);

                const currentPath = paths[paths.length - 1];
                const fidelityVal = 101 - currentPath.fidelity; 
                
                const lookbackCount = Math.max(1, Math.floor(fidelityVal / 5)); 
                let smoothX = rawX;
                let smoothY = rawY;

                if (rawPointsBuffer.length > 1) {
                    const bufferToAverage = rawPointsBuffer.slice(-lookbackCount);
                    smoothX = bufferToAverage.reduce((sum, p) => sum + p[0], 0) / bufferToAverage.length;
                    smoothY = bufferToAverage.reduce((sum, p) => sum + p[1], 0) / bufferToAverage.length;
                }

                currentPath.points.push([smoothX, smoothY]);

                // PRE-CÁLCULO GEOMÉTRICO (Formas modulares)
                if (currentPath.type !== 'line') {
                    if (!currentPath.lastStampPoint) {
                        currentPath.lastStampPoint = [smoothX, smoothY];
                        currentPath.stamps.push({ x: smoothX, y: smoothY, angle: 0, seed: 0 });
                    } else {
                        let lastX = currentPath.lastStampPoint[0];
                        let lastY = currentPath.lastStampPoint[1];
                        let dist = Math.hypot(smoothX - lastX, smoothY - lastY);
                        
                        if (dist >= currentPath.spacing) {
                            let stampsCount = Math.floor(dist / currentPath.spacing);
                            for (let j = 1; j <= stampsCount; j++) {
                                let nextX = lastX + (smoothX - lastX) * (j / stampsCount);
                                let nextY = lastY + (smoothY - lastY) * (j / stampsCount);
                                let angle = Math.atan2(smoothY - lastY, smoothX - lastX);
                                let seed = (currentPath.points.length * 100) + j;
                                currentPath.stamps.push({ x: nextX, y: nextY, angle: angle, seed: seed });
                            }
                            currentPath.lastStampPoint = [smoothX, smoothY];
                        }
                    }
                }
            }

            function renderAllPaths() {
                requestAnimationFrame(renderAllPaths);

                const motionType = motionTypeInput.value;
                
                // Si no hay animación y no se está dibujando, se detiene el render (Ahorra GPU)
                if (motionType === 'none' && !isDrawing && !needsRedraw) {
                    return; 
                }

                ctx.save();
                fillBackground();

                paths.forEach(renderPath);

                ctx.restore();

                if (motionType === 'none' && !isDrawing) {
                    needsRedraw = false;
                }
            }

            function renderPath(path) {
                if (path.points.length < 1) return;

                const motionType = motionTypeInput.value;
                const time = performance.now();

                let currentSize = path.size;
                
                ctx.save();

                // === EFECTOS DE MOVIMIENTO ===
                if (motionType === 'pulse') {
                    const pulseFreq = 0.003;
                    const scaleFactor = 1 + (Math.sin(time * pulseFreq) * 0.3); 
                    currentSize = path.size * scaleFactor;
                } 
                else if (motionType === 'vibrate') {
                    const vibX = (Math.random() - 0.5) * 5;
                    const vibY = (Math.random() - 0.5) * 5;
                    ctx.translate(vibX, vibY);
                }
                
                if (path.blur > 0) {
                    let activeBlur = motionType === 'pulse' ? path.blur * (currentSize/path.size) : path.blur;
                    ctx.filter = `blur(${activeBlur}px)`;
                }
                
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';

                // 1. DIBUJAR LÍNEA CONTINUA
                if (path.type === 'line') {
                    // Si el contorno está activado, dibujamos primero una línea más gruesa atrás
                    if (path.hasOutline) {
                        ctx.lineWidth = currentSize + (path.outlineWidth * 2);
                        ctx.strokeStyle = path.outlineColor;
                        ctx.beginPath();
                        ctx.moveTo(path.points[0][0], path.points[0][1]);
                        for(let i = 1; i < path.points.length; i++) {
                            ctx.lineTo(path.points[i][0], path.points[i][1]);
                        }
                        ctx.stroke();
                    }

                    // Línea principal (Color sólido)
                    ctx.lineWidth = currentSize;
                    ctx.strokeStyle = path.color;
                    ctx.beginPath();
                    ctx.moveTo(path.points[0][0], path.points[0][1]);
                    for(let i = 1; i < path.points.length; i++) {
                        ctx.lineTo(path.points[i][0], path.points[i][1]);
                    }
                    ctx.stroke();
                } 
                // 2. DIBUJAR FORMAS MODULARES
                else if (path.stamps) {
                    for(let i = 0; i < path.stamps.length; i++) {
                        let s = path.stamps[i];
                        drawStampOnPoint(path, s.x, s.y, s.angle, currentSize, s.seed);
                    }
                }
                
                ctx.restore();
            }

            function drawStampOnPoint(path, x, y, angle, size, seedBase) {
                const type = path.type;
                
                ctx.save();
                ctx.translate(x, y);
                
                if(type === 'ant' || type === 'bee') {
                    ctx.rotate(angle + Math.PI / 2); 
                } else if(type === 'star' || type === 'square') {
                    ctx.rotate(angle); 
                }

                ctx.fillStyle = path.color;
                
                if(type === 'dot') {
                    ctx.beginPath(); ctx.arc(0, 0, size/2, 0, Math.PI * 2); ctx.fill();
                    if(path.hasOutline) strokeShape(path);
                } else if (type === 'square') {
                    for(let i = 0; i < 3; i++) {
                        ctx.save();
                        let rA = Math.sin(seedBase + i * 10) * 0.5 + 0.5; 
                        let rB = Math.cos(seedBase + i * 20) * 0.5 + 0.5;
                        const randomRot = (rA - 0.5) * 0.8;
                        const posOffX = (rA - 0.5) * size * 0.4;
                        const posOffY = (rB - 0.5) * size * 0.4;
                        
                        ctx.rotate(randomRot);
                        ctx.fillRect(-(size/2) + posOffX, -(size/2) + posOffY, size, size);
                        if(path.hasOutline) {
                            ctx.lineWidth = path.outlineWidth; ctx.strokeStyle = path.outlineColor;
                            ctx.strokeRect(-(size/2) + posOffX, -(size/2) + posOffY, size, size);
                        }
                        ctx.restore();
                    }
                } else if (type === 'star') {
                    drawStar(0, 0, 5, size/2, size/4);
                    if(path.hasOutline) strokeShape(path);
                } else if (type === 'ant' || type === 'bee') {
                    const emoji = type === 'ant' ? "🐜" : "🐝";
                    ctx.font = `${size}px sans-serif`; ctx.textAlign = "center"; ctx.textBaseline = "middle"; 
                    if(path.hasOutline) {
                        ctx.lineWidth = path.outlineWidth; ctx.strokeStyle = path.outlineColor;
                        ctx.strokeText(emoji, 0, 0);
                    }
                    ctx.fillText(emoji, 0, 0);
                } else if (type === 'disordered') {
                    for(let i = 0; i < 5; i++) {
                        ctx.save();
                        let rA = Math.abs(Math.sin(seedBase + i * 13));
                        let rB = Math.abs(Math.cos(seedBase + i * 17));
                        const randomW = size * (0.8 + rA * 0.4);
                        const randomH = size * (0.4 + rB * 1.5);
                        const posOffX = (rA - 0.5) * size * 0.3;
                        const posOffY = (rB - 0.5) * size * 0.3;
                        
                        ctx.fillRect(-(randomW/2) + posOffX, -(randomH/2) + posOffY, randomW, randomH);
                        if(path.hasOutline) {
                            ctx.lineWidth = path.outlineWidth; ctx.strokeStyle = path.outlineColor;
                            ctx.strokeRect(-(randomW/2) + posOffX, -(randomH/2) + posOffY, randomW, randomH);
                        }
                        ctx.restore();
                    }
                }

                ctx.restore();
            }
            
            // Función auxiliar para contornear formas básicas modulares (Dot, Star)
            function strokeShape(path) {
                ctx.lineWidth = path.outlineWidth;
                ctx.strokeStyle = path.outlineColor;
                ctx.lineJoin = 'miter'; 
                ctx.stroke();
            }

            function drawStar(cx, cy, spikes, outerRadius, innerRadius) {
                let rot = Math.PI / 2 * 3;
                let step = Math.PI / spikes;
                ctx.beginPath();
                ctx.moveTo(cx, cy - outerRadius);
                for (let i = 0; i < spikes; i++) {
                    ctx.lineTo(cx + Math.cos(rot) * outerRadius, cy + Math.sin(rot) * outerRadius);
                    rot += step;
                    ctx.lineTo(cx + Math.cos(rot) * innerRadius, cy + Math.sin(rot) * innerRadius);
                    rot += step;
                }
                ctx.closePath(); ctx.fill();
            }

            function exportArtwork() {
                const dataURL = canvas.toDataURL('image/png', 1.0);
                const link = document.createElement('a');
                link.download = `22-DDM_Artwork_${new Date().getTime()}.png`;
                link.href = dataURL;
                link.click();
            }

            // Pointer Event Listeners 
            canvas.addEventListener('pointerdown', startPosition);
            canvas.addEventListener('pointerup', endPosition);
            canvas.addEventListener('pointermove', draw);
            canvas.addEventListener('pointerleave', endPosition);
            canvas.addEventListener('pointercancel', endPosition);

            // Undo / Deshacer (Cmd+Z o Ctrl+Z)
            document.addEventListener('keydown', (e) => {
                if ((e.metaKey || e.ctrlKey) && e.key === 'z') {
                    e.preventDefault(); 
                    if (paths.length > 0) {
                        paths.pop(); 
                        needsRedraw = true; 
                    }
                }
            });

            // UI Listeners
            formatSelect.addEventListener('change', initCanvas);
            bgColorInput.addEventListener('input', () => { needsRedraw = true; });
            motionTypeInput.addEventListener('change', () => { needsRedraw = true; });
            btnClear.addEventListener('click', () => { paths.length = 0; needsRedraw = true; }); 
            btnExport.addEventListener('click', exportArtwork);

            // Zoom Controls
            function applyZoom() { canvasWrapper.style.transform = `scale(${currentZoom})`; }
            function resetZoom() { currentZoom = 1; applyZoom(); }
            document.getElementById('btn-zoom-in').addEventListener('click', () => { currentZoom += 0.2; applyZoom(); });
            document.getElementById('btn-zoom-out').addEventListener('click', () => { if(currentZoom > 0.4) { currentZoom -= 0.2; applyZoom(); } });
            document.getElementById('btn-zoom-fit').addEventListener('click', resetZoom);

            // Iniciar
            initCanvas();
            requestAnimationFrame(renderAllPaths); 
        });
    </script>
</body>
</html>
