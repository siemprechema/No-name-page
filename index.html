<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador Modular Studio</title>
    <style>
        /* === ESTILO SUIZO - VARIABLES Y RESET === */
        :root {
            --bg-color: #fdfdfd;
            --text-color: #000000;
            --border-color: #000000;
            --accent-color: #e0ff00; /* Un guiño al fondo verde brillante de tus hormigas */
            --font-main: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            border-radius: 0; /* Sin bordes redondeados en Estilo Suizo */
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
            font-size: 14px;
        }

        /* === LAYOUT PRINCIPAL === */
        .app-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* === BARRA LATERAL (CONTROLES) === */
        .sidebar {
            width: 320px;
            min-width: 320px;
            height: 100%;
            border-right: 2px solid var(--border-color);
            display: flex;
            flex-direction: column;
            background-color: #ffffff;
            overflow-y: auto;
        }

        .header-brand {
            padding: 24px;
            border-bottom: 2px solid var(--border-color);
            background-color: var(--text-color);
            color: white;
        }

        .header-brand h1 {
            font-size: 24px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        .header-brand p {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }

        .module-section {
            padding: 24px;
            border-bottom: 1px solid var(--border-color);
        }

        .module-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 16px;
            letter-spacing: 0.5px;
        }

        /* === COMPONENTES DE FORMULARIO SUIZO === */
        .control-group {
            margin-bottom: 16px;
        }

        .control-group label {
            display: block;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        input[type="text"], select {
            width: 100%;
            padding: 10px;
            border: 2px solid var(--border-color);
            background: transparent;
            font-family: var(--font-main);
            font-size: 12px;
            text-transform: uppercase;
            appearance: none;
            cursor: pointer;
            outline: none;
        }

        select {
            background-image: url('data:image/svg+xml;utf8,<svg fill="black" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/><path d="M0 0h24v24H0z" fill="none"/></svg>');
            background-repeat: no-repeat;
            background-position-x: 98%;
            background-position-y: 50%;
        }

        input[type="text"]:focus, select:focus {
            background-color: var(--text-color);
            color: white;
        }

        /* Sliders Personalizados Estilo Crudo */
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            background: var(--text-color);
            cursor: pointer;
            margin-top: -6px;
        }

        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: var(--text-color);
        }

        /* Toggles / Checkboxes */
        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .checkbox-wrapper input[type="checkbox"] {
            appearance: none;
            width: 16px;
            height: 16px;
            border: 2px solid var(--border-color);
            cursor: pointer;
        }

        .checkbox-wrapper input[type="checkbox"]:checked {
            background-color: var(--text-color);
        }

        /* === ÁREA DEL LIENZO === */
        .canvas-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            background-color: #f0f0f0;
            position: relative;
        }

        .canvas-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            overflow: hidden;
        }

        /* Simulador del Canvas */
        #art-canvas {
            background-color: #bdf271; /* Verde inspirado en la referencia */
            width: 100%;
            max-width: 800px;
            aspect-ratio: 4/5;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid rgba(0,0,0,0.05);
        }

        /* === BARRA DE ACCIÓN (EXPORTAR) === */
        .action-bar {
            padding: 24px;
            border-top: 2px solid var(--border-color);
            background-color: white;
            display: flex;
            gap: 16px;
            justify-content: flex-end;
        }

        .btn {
            padding: 12px 24px;
            font-family: var(--font-main);
            font-weight: 700;
            font-size: 12px;
            text-transform: uppercase;
            cursor: pointer;
            border: 2px solid var(--border-color);
            transition: all 0.2s ease;
        }

        .btn-outline {
            background-color: transparent;
            color: var(--text-color);
        }

        .btn-outline:hover {
            background-color: #f0f0f0;
        }

        .btn-solid {
            background-color: var(--text-color);
            color: white;
        }

        .btn-solid:hover {
            background-color: var(--accent-color);
            color: var(--text-color);
            border-color: var(--accent-color);
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <aside class="sidebar">
            <header class="header-brand">
                <h1>Typo/Gen</h1>
                <p>Motion & Brush Studio v1.0</p>
            </header>

            <section class="module-section">
                <h2 class="module-title">1. Entrada de Texto</h2>
                <div class="control-group">
                    <label>Escribe tu frase</label>
                    <input type="text" placeholder="EJ. SUMMER">
                </div>
            </section>

            <section class="module-section">
                <h2 class="module-title">2. Pincel & Trazo</h2>
                <div class="control-group">
                    <label>Tipo de Pincel</label>
                    <select>
                        <option>Modular (Objeto)</option>
                        <option>Textura (Cerdas Secas)</option>
                        <option>Patrón (Líneas)</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>Biblioteca de Objetos</label>
                    <select>
                        <option>Hormigas (Ants)</option>
                        <option>Estrellas 5 Puntas</option>
                        <option>Flores Básicas</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>Densidad de Trazado</label>
                    <input type="range" min="1" max="100" value="85">
                </div>
                <div class="control-group">
                    <label>Rotación del Módulo</label>
                    <input type="range" min="0" max="360" value="45">
                </div>
                <div class="control-group checkbox-wrapper">
                    <input type="checkbox" id="particles">
                    <label for="particles" style="margin-bottom:0;">Añadir Partículas Polvo</label>
                </div>
            </section>

            <section class="module-section">
                <h2 class="module-title">3. Motion Setup</h2>
                <div class="control-group">
                    <label>Modo de Animación</label>
                    <select>
                        <option>Scroll Continuo (Diagonal)</option>
                        <option>Pulso de Escala</option>
                        <option>Estático (Sin Movimiento)</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>Velocidad (Tempo)</label>
                    <input type="range" min="1" max="100" value="50">
                </div>
            </section>

            <section class="module-section" style="border-bottom: none;">
                <h2 class="module-title">4. Lienzo de Fondo</h2>
                <div class="control-group">
                    <label>Textura Base</label>
                    <select>
                        <option>Verde Neón Sólido</option>
                        <option>Papel Acuarela</option>
                        <option>Dorado Texturizado</option>
                    </select>
                </div>
            </section>
        </aside>

        <main class="canvas-area">
            <div class="canvas-container">
                <div id="art-canvas">
                    </div>
            </div>

            <div class="action-bar">
                <button class="btn btn-outline">Guardar PNG Estático</button>
                <button class="btn btn-solid">Exportar Animación (MP4)</button>
            </div>
        </main>

    </div>

</body>
</html>
